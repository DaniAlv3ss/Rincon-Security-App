<!-- Modal Funcionario -->
<div v-if="activeModal === 'guard'" class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1050;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold font-heading">{{ formGuard.ID ? 'Editar Agente' : 'Novo Agente' }}</h5>
                <button type="button" class="btn-close" :class="{'btn-close-white': isDarkMode}" @click="closeModal"></button>
            </div>
            <div class="modal-body">
                <form @submit.prevent="saveGuard">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Nome</label>
                        <input v-model="formGuard.Nome" type="text" class="form-control" required placeholder="Ex: João Alves">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Nº de Telefone</label>
                        <input v-model="formGuard.Telefone" type="tel" class="form-control" required placeholder="(00) 00000-0000">
                    </div>
                    <button type="submit" class="btn btn-gold fw-bold w-100 mt-4 py-2">SALVAR</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal Local -->
<div v-if="activeModal === 'location'" class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1050;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold font-heading">{{ formLocation.ID ? 'Editar Local' : 'Novo Local / Evento' }}</h5>
                <button type="button" class="btn-close" :class="{'btn-close-white': isDarkMode}" @click="closeModal"></button>
            </div>
            <div class="modal-body">
                <form @submit.prevent="saveLocation">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Nome do Posto / Evento</label>
                        <input v-model="formLocation.Nome" type="text" class="form-control" required>
                    </div>
                    <div class="mb-4 form-check form-switch bg-body p-3 rounded border" style="border-color: var(--border-color) !important;">
                        <input class="form-check-input ms-0 me-3" type="checkbox" role="switch" id="isEventCheck" v-model="formLocation.isEvent">
                        <label class="form-check-label text-gold fw-bold" for="isEventCheck">Este local é um Evento Temporário?</label>
                    </div>
                    <div v-if="formLocation.isEvent" class="row g-3">
                        <div class="col-6"><label class="form-label text-muted small fw-bold text-uppercase">Data Início</label><input v-model="formLocation.Data_Inicio" type="date" class="form-control" required></div>
                        <div class="col-6"><label class="form-label text-muted small fw-bold text-uppercase">Hora Início</label><input v-model="formLocation.Hora_Inicio" type="time" class="form-control" required></div>
                        <div class="col-6"><label class="form-label text-muted small fw-bold text-uppercase">Data Fim</label><input v-model="formLocation.Data_Fim" type="date" class="form-control" required></div>
                        <div class="col-6"><label class="form-label text-muted small fw-bold text-uppercase">Hora Fim</label><input v-model="formLocation.Hora_Fim" type="time" class="form-control" required></div>
                    </div>
                    <button type="submit" class="btn btn-gold fw-bold w-100 mt-4 py-2">SALVAR LOCAL</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal Escala (Multi-Agent) -->
<div v-if="activeModal === 'shift'" class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1050;">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold font-heading">{{ isEditingShift ? 'Editar Escala' : 'Alocar Múltiplos Efetivos' }}</h5>
                <button type="button" class="btn-close" :class="{'btn-close-white': isDarkMode}" @click="closeModal"></button>
            </div>
            <div class="modal-body p-4">
                <div v-if="errorMsg" class="alert alert-danger fw-bold small"><i data-lucide="alert-triangle" style="width: 16px;"></i> {{ errorMsg }}</div>
                <form @submit.prevent="saveShift">
                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label class="form-label text-muted small fw-bold text-uppercase">Local / Evento</label>
                            <select v-model="formShift.ID_LocalEvento" class="form-select" required>
                                <option v-for="l in activeLocations" :key="l.ID" :value="l.ID">{{ l.Nome }} {{l.Tipo === 'Evento' ? '(Evento)' : '(Fixo)'}}</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-body p-3 rounded border mb-4" style="border-color: var(--border-color) !important;">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="syncTimeCheck" v-model="formShift.syncTime">
                            <label class="form-check-label fw-bold" :class="formShift.syncTime ? 'text-gold' : 'text-muted'" for="syncTimeCheck">
                                Sincronizar com os horários do Evento/Local
                            </label>
                        </div>
                        <div class="row g-3">
                            <div class="col-12 col-md-4"><label class="form-label text-muted small fw-bold text-uppercase">Data do Turno</label><input v-model="formShift.Data" type="date" class="form-control" required :disabled="formShift.syncTime"></div>
                            <div class="col-6 col-md-4"><label class="form-label text-muted small fw-bold text-uppercase">Entrada</label><input v-model="formShift.Horario_Entrada" type="time" class="form-control" required :disabled="formShift.syncTime"></div>
                            <div class="col-6 col-md-4"><label class="form-label text-muted small fw-bold text-uppercase">Saída</label><input v-model="formShift.Horario_Saida" type="time" class="form-control" required :disabled="formShift.syncTime"></div>
                        </div>
                    </div>

                    <hr style="border-color: var(--border-color);">
                    <h6 class="fw-bold mb-3 text-gold">Agentes & Funções</h6>

                    <div v-for="(agente, index) in formShift.agentes" :key="index" class="d-flex flex-column flex-md-row gap-2 mb-3 bg-body p-2 rounded border position-relative" style="border-color: var(--border-color) !important;">
                        <div class="flex-grow-1">
                            <select v-model="agente.ID_Funcionario" class="form-select border-0 bg-transparent" required>
                                <option value="" disabled>Selecione um agente...</option>
                                <option v-for="g in activeGuards" :key="g.ID" :value="g.ID">{{ g.Nome }} ({{g.Telefone}})</option>
                            </select>
                        </div>
                        <div style="width: 2px; background: var(--border-color); margin: 5px 0;" class="d-none d-md-block"></div>
                        <div class="flex-grow-1">
                            <select v-model="agente.Funcao" @change="handleRoleChange($event, index)" class="form-select border-0 bg-transparent" required>
                                <option value="" disabled>Atribuir Função...</option>
                                <option v-for="f in funcoes" :key="f.ID" :value="f.Nome">{{ f.Nome }}</option>
                                <option value="NEW_ROLE" class="text-gold fw-bold">+ Criar Nova Função</option>
                            </select>
                        </div>
                        <button v-if="formShift.agentes.length > 1 && !isEditingShift" type="button" @click="removeAgentRow(index)" class="btn btn-link text-danger p-2"><i data-lucide="trash-2" style="width: 18px;"></i></button>
                    </div>

                    <button v-if="!isEditingShift" type="button" @click="addAgentRow" class="btn btn-sm btn-outline-secondary w-100 mb-4 fw-bold" style="border-style: dashed;"><i data-lucide="plus" style="width: 14px;"></i> ADICIONAR MAIS UM AGENTE</button>

                    <button type="submit" class="btn btn-gold fw-bold w-100 py-3 mt-2">CONFIRMAR ALOCAÇÃO</button>
                </form>
            </div>
        </div>
    </div>
</div>
