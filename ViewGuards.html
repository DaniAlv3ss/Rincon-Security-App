<transition name="view-fade" mode="out-in">
    <div>
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-end mb-4 border-bottom pb-3" style="border-color: var(--border-color) !important;">
            <div><h2 class="display-6 fw-bold font-heading mb-0" style="color: var(--text-main);">Efetivo Corporativo</h2></div>
            <div class="d-flex align-items-center gap-3 mt-3 mt-md-0">
                <div class="sub-nav-tabs shadow-sm">
                    <button @click="guardSubView = 'active'" :class="['sub-nav-btn btn-anim', { active: guardSubView === 'active' }]">Agentes Ativos</button>
                    <button @click="guardSubView = 'history'" :class="['sub-nav-btn btn-anim', { active: guardSubView === 'history' }]">Inativos</button>
                </div>
                <button v-if="guardSubView === 'active'" @click="openModal('guard')" class="btn btn-gold fw-bold d-flex align-items-center gap-2 shadow-sm btn-anim" type="button"><i data-lucide="plus" style="width: 16px;"></i> NOVO AGENTE</button>
            </div>
        </div>

        <div class="glass-panel p-0 rounded-3 overflow-hidden shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle m-0" style="color: var(--text-main); --bs-table-bg: transparent; --bs-table-hover-bg: rgba(245, 158, 11, 0.05);">
                    <thead style="background-color: var(--bg-surface); border-bottom: 2px solid var(--border-color);">
                        <tr>
                            <th class="border-0 text-muted small fw-bold text-uppercase py-3 ps-4">Nome do Agente</th>
                            <th class="border-0 text-muted small fw-bold text-uppercase py-3">Contato Telefone</th>
                            <th class="border-0 text-muted small fw-bold text-uppercase py-3 text-center">Status Operacional</th>
                            <th class="border-0 text-muted small fw-bold text-uppercase py-3 text-end pe-4">Ações</th>
                        </tr>
                    </thead>
                    <transition-group tag="tbody" name="list">
                        <tr v-for="g in filteredGuards" :key="g.ID" style="border-color: var(--border-color);">
                            <td class="ps-4">
                                <div class="d-flex align-items-center gap-3 py-1">
                                    <div class="avatar-initials shadow-sm" style="width: 38px; height: 38px; font-size: 0.9rem;">{{ getInitials(g.Nome) }}</div>
                                    <span class="fw-bold fs-6">{{ g.Nome }}</span>
                                </div>
                            </td>
                            <td class="font-monospace text-muted">{{ g.Telefone }}</td>
                            <td class="text-center">
                                <span :class="['badge rounded-pill px-3 py-1 border', g.Status === 'Ativo' ? 'bg-success bg-opacity-25 text-success border-success' : 'bg-danger bg-opacity-25 text-danger border-danger']">{{ g.Status }}</span>
                            </td>
                            <td class="text-end pe-4">
                                <button @click="editGuard(g)" class="btn btn-sm btn-link text-muted p-1 hover-text-gold me-1 btn-anim" title="Editar"><i data-lucide="pencil" style="width: 18px;"></i></button>
                                <button v-if="g.Status === 'Ativo'" @click="changeGuardStatus(g.ID, 'Inativo')" class="btn btn-sm btn-link text-warning p-1 me-1 btn-anim" title="Desativar"><i data-lucide="user-minus" style="width: 18px;"></i></button>
                                <button v-if="g.Status === 'Inativo'" @click="changeGuardStatus(g.ID, 'Ativo')" class="btn btn-sm btn-link text-success p-1 me-1 btn-anim" title="Reativar"><i data-lucide="user-check" style="width: 18px;"></i></button>
                                <button @click="deleteRecord('FUNCIONARIOS', g.ID)" class="btn btn-sm btn-link text-danger p-1 btn-anim" title="Excluir"><i data-lucide="trash-2" style="width: 18px;"></i></button>
                            </td>
                        </tr>
                        <tr v-if="filteredGuards.length === 0" key="empty">
                            <td colspan="4" class="text-center py-5 text-muted">Nenhum agente encontrado nesta visão.</td>
                        </tr>
                    </transition-group>
                </table>
            </div>
        </div>
    </div>
</transition>
