<!DOCTYPE html>
<html lang="pt-PT" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rincon Security: Gestão de Escala</title>
    <meta name="description" content="Sistema completo de gestão operacional tática para a Rincon Security." />
    
    <script>
        window.addEventListener('error', function(event) {
            console.error("Erro Crítico Capturado:", event.message);
            window.onload = function() {
                if(!document.getElementById('app') || document.getElementById('app').innerHTML.trim() === "") {
                    document.body.innerHTML = `
                        <div style="display:flex; height:100vh; width:100vw; background-color:#09090b; color:#fafafa; align-items:center; justify-content:center; font-family: sans-serif; text-align:center;">
                            <div>
                                <h2 style="color:#f59e0b;">⚠️ Falha de Inicialização</h2>
                                <p style="color:#a1a1aa; max-width: 400px; margin: 0 auto;">O Rincon Security não conseguiu se conectar aos servidores. Por favor, recarregue a página.</p>
                                <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 20px; background-color:#f59e0b; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">RECARREGAR SISTEMA</button>
                            </div>
                        </div>
                    `;
                }
            };
        });
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">

    <?!= include('Styles'); ?>
</head>
<body>

<div id="app" class="vh-100 overflow-hidden">
    <transition name="fade" mode="out-in">
        <div v-if="isInitialLoading" key="loading" class="h-100 w-100">
            <?!= include('Loader'); ?>
        </div>

        <div v-else key="main-app" class="d-flex h-100 w-100 position-relative">
            <div v-if="isLoading" id="globalLoader"></div>
            
            <?!= include('Sidebar'); ?>

            <main class="flex-grow-1 position-relative overflow-auto content-wrapper pt-5 pt-lg-0">
                <div v-if="isDarkMode" class="position-fixed top-0 end-0 p-5 rounded-circle bg-warning opacity-10 blur-xl" style="width: 400px; height: 400px; filter: blur(100px); pointer-events: none;"></div>
                
                <div class="container-fluid p-4 p-lg-5 position-relative" style="z-index: 10;">
                    <transition name="view-fade" mode="out-in">
                        <div v-if="currentView === 'dashboard'" key="dashboard"><?!= include('ViewDashboard'); ?></div>
                        <div v-else-if="currentView === 'events'" key="events"><?!= include('ViewEvents'); ?></div>
                        <div v-else-if="currentView === 'guards'" key="guards"><?!= include('ViewGuards'); ?></div>
                        <div v-else-if="currentView === 'roles'" key="roles"><?!= include('ViewRoles'); ?></div>
                        <div v-else-if="currentView === 'schedule'" key="schedule"><?!= include('ViewSchedule'); ?></div>
                    </transition>
                </div>
            </main>

            <?!= include('Modals'); ?>
        </div>
    </transition>
</div>

<?!= include('Scripts'); ?>

</body>
</html>
